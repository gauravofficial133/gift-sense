services:
  backend:
    build:
      context: ./giftsense-backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./giftsense-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./giftsense-frontend/src:/app/src
      - ./giftsense-frontend/public:/app/public
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
