<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Gift box body -->
  <rect x="6" y="22" width="36" height="22" rx="3" fill="#ea580c"/>
  <!-- Gift box lid -->
  <rect x="4" y="16" width="40" height="8" rx="2.5" fill="#f97316"/>
  <!-- Vertical ribbon -->
  <rect x="21" y="16" width="6" height="28" fill="#fed7aa"/>
  <!-- Horizontal ribbon -->
  <rect x="4" y="18" width="40" height="4" fill="#fed7aa"/>
  <!-- Bow left loop -->
  <ellipse cx="18" cy="12" rx="6" ry="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Bow right loop -->
  <ellipse cx="30" cy="12" rx="6" ry="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Bow center knot -->
  <circle cx="24" cy="14" r="3.5" fill="#ea580c"/>
</svg>
